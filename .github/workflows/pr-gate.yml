name: PR Gate - Branch Verification

on:
  pull_request:
    branches: [ main, dev ]
    types: [ opened, synchronize, reopened ]

jobs:
  verify-branch:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Print Workflow Branch Info
      run: |
        echo "========================================"
        echo "PR 门禁验证 - 分支信息"
        echo "========================================"
        echo "当前执行的分支 (github.ref): ${{ github.ref }}"
        echo "当前执行的分支名称 (github.ref_name): ${{ github.ref_name }}"
        echo "PR 源分支 (github.head_ref): ${{ github.head_ref }}"
        echo "PR 目标分支 (github.base_ref): ${{ github.base_ref }}"
        echo "工作流文件所在分支: ${{ github.event.pull_request.head.ref }}"
        echo "========================================"
        echo "结论: 此 workflow 执行在 ${{ github.ref_name }} 分支上"
        echo "========================================"